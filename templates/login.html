<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">

    <title>C.R.I.A - Login</title>

    <!-- FONT -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/login.css') }}"
    >

</head>

<body>

    <div class="login-box">

        <div class="logo">
            🤖 C.R.I.A
        </div>

        <div class="subtitulo">
            Sistema Inteligente de Triagem
        </div>

        <!-- NOME -->
        <div class="input-group">

            <label for="nome">
                Nome
            </label>

            <input
                type="text"
                id="nome"
                placeholder="Digite seu nome"
                autocomplete="off"
            >

        </div>

        <!-- CPF -->
        <div class="input-group">

            <label for="cpf">
                CPF
            </label>

            <input
                type="text"
                id="cpf"
                placeholder="000.000.000-00"
                maxlength="14"
                autocomplete="off"
            >

        </div>

        <!-- TIPO -->
        <div class="input-group">

            <label for="tipo">
                Tipo de acesso
            </label>

            <select id="tipo">

                <option value="Autoatendimento">
                    Autoatendimento
                </option>

                <option value="Tecnico">
                    Técnico em Enfermagem
                </option>

                <option value="Medico">
                    Médico
                </option>

            </select>

        </div>

        <!-- BOTÃO -->
        <button id="btnLogin">
            Entrar
        </button>

        <!-- MENSAGEM -->
        <div id="mensagem"></div>

    </div>

    <!-- JS -->
    <script
        src="{{ url_for('static', filename='js/login.js') }}"
    ></script>

</body>
</html>
